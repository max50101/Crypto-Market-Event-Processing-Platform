spring:
  application:
    name: crypto-platform
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:crypto_alerts}
    username: ${POSTGRES_USER:crypto_user}
    password: ${POSTGRES_PASSWORD:crypto_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: crypto-alert-group
      auto-offset-reset: earliest
  data:
    redis:
      host: localhost
      port: 6379
server:
  port: 8081
app:
  base-url: http://localhost:8081
  kafka:
    topics:
      price-updated: market.price-updated
      alert-triggered: alert.triggered
binance:
  base-url: wss://stream.binance.com:9443
  symbols: [BTCUSDT, ETHUSDT, SOLUSDT, XRPUSDT]
  base-api-url: https://api.binance.com
resend:
  api-key: ${RESEND_API_KEY}
telegram:
  bot:
    token: ${TELEGRAM_API_KEY}
    base-url: https://api.telegram.org
